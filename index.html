<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Support with Lightning</title>
    <link rel="stylesheet" href="src/css/styles.css" />
  </head>
  <body>
    <main id="donationCard" class="card">
      <h1>⚡ Support my work</h1>
      <p>
        Generate a Blink Lightning invoice instantly. Thank you for your
        support!
      </p>

      <button id="donateButton" class="donate-btn" type="button">
        Generate Lightning Invoice
      </button>

      <div class="field">
        <div class="label">Blink Username</div>
        <div class="value">
          <input id="blinkUsername" placeholder="yourusername" />
        </div>
      </div>

      <div class="field">
        <div class="label">Amount (sats)</div>
        <div class="value">
          <input id="amountSats" type="number" min="1" step="1" value="1000" />
        </div>
      </div>

      <div class="field">
        <div class="label">Generated BOLT11 Invoice</div>
        <div class="value">
          <input id="paymentRequest" readonly />
          <button id="copyButton" class="copy-btn" type="button">
            Copy Invoice
          </button>
        </div>
      </div>

      <div class="qr-section">
        <div class="label">Invoice QR</div>
        <div id="invoiceQr"></div>
        <div id="paymentState" class="payment-state">Status: —</div>
      </div>

      <div id="status" class="hint">
        Uses Blink no-key flow: accountDefaultWallet →
        lnInvoiceCreateOnBehalfOfRecipient.
      </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="src/js/app.js"></script>
  </body>
</html>
